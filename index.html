        const next=document.querySelector('.next')
        const rewind=document.querySelector('.rewind')
        const animacion=document.querySelector('.animacionMusica')
        i=0;
        next.addEventListener('click',function(){
            if(i>=canciones.length-1){
               
                animacion.style.opacity='1';
           

            
                canciones[i].pause()
                canciones[i].currentTime = 0;
                i=0
                canciones[i].play()
                caratula.style.backgroundImage="url('img/c3.jpg')"
               
            
            }else{
                
               
            animacion.style.opacity='1';
           

            
            canciones[i].pause()
            canciones[i].currentTime = 0;
            caratula.style.backgrondRepeat="no-repeat"
            caratula.style.backgrondPosition="center"
            caratula.style.backgroundSize="cover"
            i++;
            caratula.style.backgroundImage="url('img/c"+(i)+".jpg')"
            
            canciones[i].play()
           
            
            
            }    
         

        })
        rewind.addEventListener('click',function(){
            
            if(i<=0){
                animacion.style.opacity='1';
             canciones[i].pause()
             canciones[i].currentTime = 0;
             i=canciones.length-1
             canciones[i].play()
             caratula.style.backgroundImage="url('img/c2.jpg')"
            

            }else{
                animacion.style.opacity='1';
            canciones[i].pause()
            canciones[i].currentTime = 0;
            i--;
            caratula.style.backgroundImage="url('img/c"+(i)+".jpg')"
            
            canciones[i].play()

            }

        })


        play.addEventListener('click',function(){
           
            if(canciones[i].paused){
                  canciones[i].play()
            animacion.style.opacity='1'
           

            }
          if(canciones[i].ended){
            i++
            canciones[i].play()
          }
        })
        pause.addEventListener('click',function(){
           
           if(canciones[i].play){
                 canciones[i].pause()
           animacion.style.opacity='0'
          

           }
       
       })
